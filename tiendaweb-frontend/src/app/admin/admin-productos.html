<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Gestion de Productos</h2>
    <button class="btn btn-primary" (click)="mostrarFormulario = !mostrarFormulario">
      {{ mostrarFormulario ? 'Cancelar' : 'Agregar Producto' }}
    </button>
  </div>

  <div *ngIf="mostrarFormulario" class="card mb-4">
    <div class="card-body">
      <h5>{{ editando ? 'Editar Producto' : 'Nuevo Producto' }}</h5>
      <form (ngSubmit)="guardarProducto()">
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" [(ngModel)]="productoForm.nombre" name="nombre" required>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Precio</label>
              <input type="number" class="form-control" [(ngModel)]="productoForm.precio" name="precio" required>
            </div>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Descripcion</label>
          <input type="text" class="form-control" [(ngModel)]="productoForm.descripcion" name="descripcion">
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Plataforma</label>
              <input type="text" class="form-control" [(ngModel)]="productoForm.plataforma" name="plataforma">
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Duracion (Dias)</label>
              <input type="number" class="form-control" [(ngModel)]="productoForm.duracionDias" name="duracionDias">
            </div>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Codigo de Activacion (Opcional)</label>
          <input type="text" class="form-control" [(ngModel)]="productoForm.codigoDescarga" name="codigoDescarga">
        </div>
        <button type="submit" class="btn btn-success">
          {{ editando ? 'Actualizar' : 'Guardar' }}
        </button>
        <button type="button" class="btn btn-secondary ms-2" (click)="cancelarEdicion()">
          Cancelar
        </button>
      </form>
      
      <div *ngIf="editando && productoForm.id > 0" class="mt-4 border-top pt-4">
        <app-comentarios [productoId]="productoForm.id" username="Admin"></app-comentarios>
      </div>
    </div>
  </div>

  <div *ngIf="mensaje" [class]="mensajeError ? 'alert alert-danger' : 'alert alert-success'" class="mt-3">
    {{ mensaje }}
  </div>

  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let producto of productos">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">{{ producto.nombre }}</h5>
          <p class="card-text">{{ producto.descripcion }}</p>
          <p class="card-text"><strong>${{ producto.precio }}</strong></p>
          <div class="btn-group w-100">
            <button class="btn btn-warning btn-sm" (click)="editarProducto(producto)">Editar</button>
            <button class="btn btn-danger btn-sm" (click)="eliminarProducto(producto.id)">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
